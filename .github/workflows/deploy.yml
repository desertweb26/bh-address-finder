name: Deploy

# Deploy to Cloudflare Workers on every push to master.
# Schema migrations run automatically; the one-time data load
# stays a manual step (see README).
on:
  push:
    branches: [master]
  workflow_dispatch: # allows manual re-runs from the Actions tab

# Prevent overlapping deploys from racing on rapid pushes.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_SITE_URL: ${{ secrets.SITE_URL }}

      # wrangler.jsonc is gitignored (holds the real D1 id), so generate it from
      # the committed example and substitute the real id from the secret.
      - name: Generate wrangler.jsonc from secret
        run: |
          cp worker/wrangler.jsonc.example worker/wrangler.jsonc
          sed -i 's/\${D1_DATABASE_ID}/${{ secrets.D1_DATABASE_ID }}/' worker/wrangler.jsonc
          echo "Generated worker/wrangler.jsonc with database_id"

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply bh-address-finder --remote --config worker/wrangler.jsonc

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config worker/wrangler.jsonc
